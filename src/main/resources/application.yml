# =============================================================
# 在线音乐平台 — 通用应用配置
# 所有环境共享的配置项
# =============================================================

spring:
  application:
    name: music

  # 默认激活 dev 环境
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 文件上传限制
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 200MB

  # 数据源配置 - MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/music_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:1234567}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000

  # Jackson JSON 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.music.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

# JWT 配置
music:
  jwt:
    secret: ${MUSIC_JWT_SECRET:YourSuperSecretKeyForJWTTokenGeneration2024MusicPlatform!}
    access-token-expiration: 7200000
    refresh-token-expiration: 604800000

# 服务器配置
server:
  port: ${SERVER_PORT:8888}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true