# =============================================================
# 在线音乐平台 — 通用应用配置
# 所有环境共享的配置项
# =============================================================

spring:
  application:
    name: music

  # 默认激活 dev 环境
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 文件上传限制
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 200MB

  # 数据源配置 - MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/music_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:1234567}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000

  # Jackson JSON 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.music.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

# JWT 配置
music:
  jwt:
    secret: ${MUSIC_JWT_SECRET:YourSuperSecretKeyForJWTTokenGeneration2024MusicPlatform!}
    access-token-expiration: 7200000
    refresh-token-expiration: 604800000

# =============================================================
# 支付宝沙箱支付配置
# 使用前请替换以下所有配置项为你在支付宝开放平台沙箱环境获取的值
#
# 前置条件：
# 1. 登录 https://open.alipay.com → 控制台 → 沙箱环境
# 2. 获取 APP_ID、生成 RSA2 密钥、上传公钥
# 3. 启动 ngrok 内网穿透以便支付宝回调你的本地服务
# 4. 设置 notify-url 为 ngrok 生成的公网地址
# =============================================================
# 支付宝沙箱网关（不可变，新版沙箱地址）
# ⚠️ 注意：旧版网关 https://openapi.alipaydev.com/gateway.do 已废弃（返回502）
# 如果你尚未升级沙箱环境，请立即执行升级操作（见上方说明）
alipay:
  # ⚠️ 关键变更：支付宝沙箱环境网关已升级
  # 旧版网关 https://openapi.alipaydev.com/gateway.do 已废弃（返回502）
  # 新版网关为 https://openapi-sandbox.dl.alipaydev.com/gateway.do
  #
  # 升级步骤（必须）：
  # 1. 登录 https://open.alipay.com → 控制台 → 沙箱环境
  # 2. 点击「升级沙箱环境」按钮（如未看到升级按钮，可能已自动升级）
  # 3. 获取新的 APP_ID（旧版 APP_ID 无法在新版网关使用！）
  # 4. 重新生成 RSA2 密钥对，上传新公钥到沙箱控制台
  # 5. 下载新私钥，更新 merchant-private-key 配置
  # 6. 从沙箱控制台复制新的支付宝公钥，更新 alipay-public-key 配置
  # 7. 重启后端服务
  # =============================================================
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  # 沙箱应用 APP_ID（必填）
  # 升级沙箱环境后，控制台会提供新的 APP_ID
  # 通过环境变量 ALIPAY_APP_ID 设置：
  #   $env:ALIPAY_APP_ID="新APP_ID"
  app-id: ${ALIPAY_APP_ID:9021000165631979}
  # 商户应用私钥 PKCS8 格式（必填，通过环境变量 ALIPAY_MERCHANT_PRIVATE_KEY 设置）
  # 设置方式（PowerShell）：
  #   $env:ALIPAY_MERCHANT_PRIVATE_KEY=@"
  #   -----BEGIN PRIVATE KEY-----
  #   MIIEvQIBADANBg...
  #   -----END PRIVATE KEY-----
  #   "@
  merchant-private-key: ${ALIPAY_MERCHANT_PRIVATE_KEY:}
  # 支付宝公钥（必填，通过环境变量 ALIPAY_PUBLIC_KEY 设置）
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
  # 异步通知地址（必填，需公网可访问）
  # 支付宝支付成功后通过 POST 回调此地址，用于更新订单状态
  # 建议使用 ngrok 内网穿透：启动 ngrok http 8888 后，将地址复制到此处
  # 或通过环境变量设置：$env:ALIPAY_NOTIFY_URL="https://你的ngrok地址.ngrok-free.dev/api/payment/alipay/notify"
  notify-url: ${ALIPAY_NOTIFY_URL:https://elliptic-geography-varnish.ngrok-free.dev/api/payment/alipay/notify}
  # 同步跳转地址（支付完成后支付宝将浏览器重定向到此地址）
  # 此地址指向后端，后端再重定向到前端 frontend-url
  # 注意：支付宝沙箱环境要求 return-url 必须与沙箱应用配置中的"授权回调地址"一致
  return-url: ${ALIPAY_RETURN_URL:https://elliptic-geography-varnish.ngrok-free.dev/api/payment/alipay/return}
  # 前端页面地址（支付完成后后端重定向到此地址，默认 Vite 开发服务器）
  frontend-url: ${ALIPAY_FRONTEND_URL:http://localhost:5173}

# 服务器配置
server:
  port: ${SERVER_PORT:8888}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true